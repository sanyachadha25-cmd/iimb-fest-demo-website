     <header>

    <section>
<h2>Register for iimb fest</h2>
<form action="register">
<label for="name">enter your name</label>
<input type="text" name="name" id="name" required minlength="2" maxlength="12">
<br>
<label for="email">enter your email</label>
<input type="email" name="email" id="email">
<br>
<label for="t shirt size">choose a size</label>
<select name="t shirt size" id="t shirt size">
<option value="1">-- select an option--</option>
<option value="38">38</option>
<option value="40">40</option>
<option value="42">42</option>
<option value="44">44</option>
</select>
<br>
<label for="checkbox">do you agree to the terms and conditions</label>
<input type="checkbox" name="tnc" id="checkbox">
<br>

<label for="alumni">alumni</label>
<input type="radio" name="attendee" id="alumni" value="alumni">
<label for="student">student</label>
<input type="radio" name="attendee" id="student" value="student">
<br>
<button type="submit">register</button>
</form>
</section>
<hr>

    
</body>
</html>
